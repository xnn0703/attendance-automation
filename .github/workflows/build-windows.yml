name: Build & Test

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write          # 创建 Release 需要写权限

env:
  PYTHONUTF8: '1'

jobs:
  # macOS 冒烟测试（不打包，只验证 GUI 启动和引擎计算）
  smoke-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Engine unit tests
        working-directory: app
        run: python test_engine.py

      - name: Smoke test (synthetic data)
        working-directory: app
        run: |
          python _make_sample.py /tmp/kq_sample
          KQ_DIR=/tmp/kq_sample python _smoke_gui.py

  # Windows 打包（仅 tag 推送时触发）
  build-windows:
    needs: smoke-macos
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Engine unit tests
        working-directory: app
        run: python test_engine.py

      - name: Smoke test (synthetic data)
        working-directory: app
        shell: bash
        run: |
          python _make_sample.py "${RUNNER_TEMP}/kq_sample"
          KQ_DIR="${RUNNER_TEMP}/kq_sample" python _smoke_gui.py

      - name: Build exe (PyInstaller)
        working-directory: app
        run: pyinstaller --noconfirm --windowed --onefile --name nanjing_kaoqin gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nanjing_kaoqin-windows
          path: app/dist/nanjing_kaoqin.exe

      - name: Generate checksum
        shell: bash
        run: sha256sum app/dist/nanjing_kaoqin.exe > app/dist/SHA256.txt

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            app/dist/nanjing_kaoqin.exe
            app/dist/SHA256.txt
          generate_release_notes: true
