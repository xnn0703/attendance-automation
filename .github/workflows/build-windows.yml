name: Build Windows EXE

# 推送 v* 标签自动打包并发 Release；也支持在 Actions 页面手动触发（仅出 artifact）。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write          # 创建 Release 需要写权限

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PySide6 openpyxl pyinstaller

      - name: Build exe (PyInstaller)
        working-directory: app          # 与 build_exe.bat 一致：在 app/ 下打包，engine.py 同目录被自动收集
        run: pyinstaller --noconfirm --windowed --onefile --name nanjing_kaoqin gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanjing_kaoqin-windows
          path: app/dist/nanjing_kaoqin.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/dist/nanjing_kaoqin.exe
